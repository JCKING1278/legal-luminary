name: Verify Markdown Traceability

on:
  pull_request:
    branches: ["master", "main"]
  push:
    branches: ["master", "main"]
  workflow_dispatch:

jobs:
  verify_markdown:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup uv
        uses: astral-sh/setup-uv@v3

      - name: Verify markdown (allowlist + links)
        run: uv run python scripts/verify_markdown.py --mode ci

      - name: Upload verification manifest
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: verification-manifest
          path: verification/manifest.json

