name: Validation Pipeline

on:
  pull_request:
    paths:
      - '_pages/**'
      - 'assets/**'
      - 'demos/langsmith_langgraph_demo/**'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r demos/langsmith_langgraph_demo/requirements.txt || true

      - name: Run validation pipeline
        env:
          LANGSMITH_API_KEY: ${{ secrets.LANGSMITH_API_KEY }}
          SITE_TEXT: ${{ secrets.SITE_TEXT || '' }}
        run: |
          python demos/langsmith_langgraph_demo/pipeline.py || exit 1

      - name: Upload evidence artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: validation-evidence
          path: demos/langsmith_langgraph_demo/output
