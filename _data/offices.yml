"TX Governor":
  formal_title: "Governor of Texas"
  description: "Chief executive of the State of Texas. Signs or vetoes legislation, commands the Texas National Guard, appoints agency heads and judges, and sets the legislative agenda through the State of the State address."
  term_length: "4 years"
  election_cycle: "2026 general (November 3): Greg Abbott (R) vs Gina Hinojosa (D); no term limits"
  previous_holder: "Greg Abbott (R) — serving since January 2015"
  jurisdiction: "State of Texas"
  salary: "$153,750/year"

"TX Attorney General":
  formal_title: "Attorney General of Texas"
  description: "Chief legal officer of Texas. Represents the state in litigation, issues advisory opinions on state law, enforces consumer-protection and antitrust statutes, and oversees the Crime Victims' Compensation program. Incumbent Ken Paxton is not seeking re-election as AG — he is running for U.S. Senate (runoff vs John Cornyn). AG term ends when the successor takes office in January 2027. Republican primary runoff May 26, 2026: Chip Roy vs Mayes Middleton. Democratic primary runoff May 26, 2026: Nathan Johnson vs Joe Jaworski. General election November 3, 2026 — nominees listed here after the runoffs."
  term_length: "4 years"
  election_cycle: "Primary runoff May 26, 2026 · General November 3, 2026 (nominees after runoff)"
  previous_holder: "Ken Paxton (R) — last elected AG; term ends January 2027; running for U.S. Senate, not AG"
  jurisdiction: "State of Texas"
  salary: "$153,750/year"

"TX Comptroller":
  formal_title: "Comptroller of Public Accounts of Texas"
  description: "Texas's chief financial officer. Collects state taxes and fees, estimates revenue for the biennial budget (the Biennial Revenue Estimate), manages state investments, and certifies the state budget to ensure it is balanced. Glenn Hegar resigned in 2025; Kelly Hancock served as acting comptroller and lost the March 2026 Republican primary to Don Huffines. November 2026: Don Huffines (R) vs Sarah Eckhardt (D)."
  term_length: "4 years"
  election_cycle: "2026 open seat — November 3: Don Huffines (R) vs Sarah Eckhardt (D)"
  previous_holder: "Glenn Hegar (R) resigned July 2025; Kelly Hancock (acting) — not the November nominee"
  jurisdiction: "State of Texas"
  salary: "$153,750/year"

"TX Secretary of State":
  formal_title: "Secretary of State of Texas"
  description: "Texas's chief elections officer. Administers election law, certifies candidates and results, maintains business filings, and serves as the Governor's liaison for border and Mexican affairs. This is an appointed position — the Secretary is appointed by the Governor, not elected."
  term_length: "Serves at the pleasure of the Governor"
  election_cycle: "Appointed (not elected)"
  previous_holder: "Jane Nelson — appointed by Governor Abbott, serving since January 2023"
  jurisdiction: "State of Texas"
  salary: "$197,415/year"

