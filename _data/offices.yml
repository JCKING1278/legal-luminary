  current_holder: "Kelly Hancock (R) — acting Comptroller since Glenn Hegar resigned July 1, 2025 (Hegar became Texas A&M System chancellor)"
  selection: elected
  description: "Texas's chief financial officer. Collects state taxes and fees, estimates revenue for the biennial budget (the Biennial Revenue Estimate), manages state investments, and certifies the state budget to ensure it is balanced. March 2026 Republican primary was won outright by Don Huffines; he faces Democratic nominee Sarah Eckhardt in the November 3, 2026 general election."
  term_length: "4 years"
  election_cycle: "General Nov. 3, 2026 — Don Huffines (R) vs. Sarah Eckhardt (D); acting Comptroller Hancock serves until the winner is sworn in"
  previous_holder: "Glenn Hegar (R) — elected comptroller 2015–2025; succeeded in day-to-day duties by Kelly Hancock as acting Comptroller after resignation"
  jurisdiction: "State of Texas"
  salary: "$153,750/year"

