# Office-level metadata for the candidates hub. Keyed by office_group_key.
"US Senate TX - Cornyn":
  formal_title: "U.S. Senator from Texas (Class II)"
  description: "One of two senators representing Texas in the U.S. Senate. Votes on federal legislation, confirms presidential nominations, and ratifies treaties. Class II seat up for election in 2026."
  term_length: "6 years"
  election_cycle: "Class II; this seat contested 2026"
  previous_holder: "John Cornyn (R) — serving since 2002; in 2026 primary runoff with Ken Paxton"
  jurisdiction: "State of Texas"
  salary: "$174,000/year"

"US Senate TX - Cruz":
  formal_title: "U.S. Senator from Texas (Class I)"
  description: "One of two senators representing Texas in the U.S. Senate. Votes on federal legislation, confirms presidential nominations, and ratifies treaties."
  term_length: "6 years"
