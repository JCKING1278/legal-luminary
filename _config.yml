# =============================================================================
# Central Texas Legal Resource - Jekyll Configuration
# =============================================================================
# This configuration works with GitHub Actions deployment
# See: .github/workflows/jekyll.yml

# Site Settings
title: "Legal Luminary of Central Texas - News, Courts, Politics, and more"
logo: /assets/imgs/legal-luminary-research-tool.svg
description: "Your trusted guide to Texas and Bell County law - Defense & Personal Injury information"
tagline: "Information • Guidance • Justice"
author: "Central Texas Legal Resource"
email: "notary@legalluminary.com"
lang: en-US

# URL Configuration
# For GitHub Pages project site (username.github.io/repo-name):
#   baseurl: "/repo-name"
#   url: "https://sweeden-ttu.github.io/legal-luminary"
# For custom domain or user site (username.github.io):
#   baseurl: ""
#   url: "https://legalluminary.com"
baseurl: ""
url: "https://www.legalluminary.com"

# Build Settings
markdown: kramdown
highlighter: rouge
permalink: pretty
timezone: America/Chicago
future: true

# Kramdown options
kramdown:
  input: GFM
  syntax_highlighter: rouge
  hard_wrap: false

# Plugins
plugins:
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-feed

# Site Navigation
navigation:
  - title: Home
    url: /
  - title: Fort Hood
    url: /fort-cavazos/
  - title: Texas Law
    url: /texas-law/
  - title: Bell County
    url: /bell-county/
  - title: Defense Attorneys
    url: /defense/
  - title: Personal Injury
    url: /personal-injury/
  - title: Court Directory
    url: /court-directory/
  - title: Resources
    url: /resources/
    children:
      - title: Fort Cavazos (Fort Hood)
        url: /fort-cavazos/
      - title: Bell County Odyssey Portal
        url: https://justice.bellcounty.texas.gov/PublicPortal/
        alt: Search Court Hearings and Case Records
        external: true
      - title: Artificial Intelligence
        url: /artificial-intelligence/

# Service Area Information
service_area:
  county: "Bell County"
  state: "Texas"
  cities:
    - Killeen
    - Temple
    - Belton
    - Harker Heights
    - Copperas Cove
    - Nolanville
    - Salado
    - Fort Cavazos (Fort Hood)
    - Waco

# Social media (optional; omit or leave blank to hide)
social_media:
  facebook: "https://tinyurl.com/facebook-cloudfronts"
  # twitter: ""
  # instagram: ""
  # linkedin: ""

# Featured Attorneys (for easy updating)
attorneys:
  defense:
    name: "Robert Lewis"
    title: "Attorney at Law"
    phone: "(254) 702-4767"
    location: "Killeen, Texas"
    specialty: "Criminal Defense"
    email: "robertwaynelewislaw@gmail.com"
  injury:
    name: "Manuel Alcozer"
    title: "Attorney at Law"
    phone: "(254) 765-9552"
    email: "malcozer@mbaattorneys.com"
    location: "Killeen, Texas"
    specialty: "Personal Injury"

# Sass/SCSS Processing
sass:
  style: compressed
  sass_dir: _sass

# Collections: candidates (built and deployed with site)
collections:
  candidates:
    output: true
    permalink: /candidates/:path/

# Build Output
destination: _site
keep_files:
  - .git
  - .nojekyll

# Exclude from processing
exclude:
  - .git
  - .github
  - .gitignore
  - .ruby-version
  - .bundle
  - .claude
  - Gemfile
  - Gemfile.lock
  - README.md
  - AGENTS.md
  - LICENSE
  - node_modules
  - vendor
  - "*.gemspec"
  - CNAME.example
  - docker-compose.yml
  - Dockerfile
  - docs
  - test_cases

# Include files that should be processed
include:
  - _pages
  - _candidates
  - _includes
  - _layouts
  - _data
  - _sass
  - .nojekyll

# Defaults for pages
defaults:
  - scope:
      path: "_pages"
      type: "pages"
    values:
      layout: "default"
      permalink: /:name/
  - scope:
      type: "candidates"
    values:
      layout: "candidates"
