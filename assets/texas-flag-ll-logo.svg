<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <!-- Texas flag blue -->
    <linearGradient id="blueBar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#002868"/>
      <stop offset="100%" style="stop-color:#002868"/>
    </linearGradient>
    <!-- Gold for checkmark and text -->
    <linearGradient id="gold" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700"/>
      <stop offset="100%" style="stop-color:#DAA520"/>
    </linearGradient>
    <!-- Lone star path (simplified 5-point star) -->
    <path id="star" d="M200 80 L218 150 L290 150 L230 190 L250 260 L200 220 L150 260 L170 190 L110 150 L182 150 Z"/>
  </defs>

  <!-- Texas flag layout: blue bar = 1/3 width -->
  <!-- Blue vertical bar with star -->
  <rect x="0" y="0" width="133" height="400" fill="#002868"/>
  <g transform="translate(66.5, 200)">
    <path d="M0 -55 L16 15 L75 15 L24 55 L42 115 L0 80 L-42 115 L-24 55 L-75 15 L-16 15 Z" fill="white"/>
  </g>

  <!-- White stripe (top half of remaining 2/3) -->
  <rect x="133" y="0" width="267" height="200" fill="white"/>

  <!-- Red stripe (bottom half) -->
  <rect x="133" y="200" width="267" height="200" fill="#BF0A30"/>

  <!-- Golden checkmark: bold, centered over flag -->
  <path d="M70 260 L165 155 L350 170" fill="none" stroke="url(#gold)" stroke-width="28" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Two L's - predominantly displayed -->
  <text x="200" y="310" font-family="Georgia, 'Times New Roman', serif" font-size="120" font-weight="bold" fill="url(#gold)" text-anchor="middle">LL</text>
</svg>
